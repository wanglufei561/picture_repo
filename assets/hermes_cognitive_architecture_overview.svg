<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1570" viewBox="0 0 1500 1570" role="img" aria-labelledby="title desc">
  <title id="title">Hermes 高维认知架构全景</title>
  <desc id="desc">展示 Profile Distribution、Profile、单 Agent 运行闭环、MoA、delegate_task 与 Kanban 持久任务系统之间的层级、控制流、反馈流和能力供给关系</desc>

  <defs>
    <marker id="arrow-control" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-feedback" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-supply" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #64748b; }
      .lane-title { font-size: 22px; font-weight: 700; }
      .node-title { font-size: 19px; font-weight: 700; }
      .node-sub { font-size: 14px; fill: #526075; }
      .label { font-size: 15px; font-weight: 600; fill: #475569; }
      .small { font-size: 14px; fill: #64748b; }
      .anchor-title { font-size: 18px; font-weight: 700; }
      .anchor-sub { font-size: 15px; fill: #526075; }
      .control { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow-control); }
      .feedback { fill: none; stroke: #059669; stroke-width: 2.5; marker-end: url(#arrow-feedback); }
      .capability { fill: none; stroke: #7c3aed; stroke-width: 2.5; marker-end: url(#arrow-supply); }
      .supply { fill: none; stroke: #7c3aed; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow-supply); }
    </style>
  </defs>

  <rect width="1500" height="1570" fill="#f7f8fc"/>

  <text x="60" y="52" class="title">Hermes 全貌：从长期身份到持久多 Agent 协作</text>
  <text x="60" y="82" class="subtitle">运行闭环、能力接入、身份供给与三种并行机制分层表达</text>

  <line x1="740" y1="103" x2="790" y2="103" class="control"/>
  <text x="805" y="108" class="small">控制流</text>
  <line x1="900" y1="103" x2="950" y2="103" class="feedback"/>
  <text x="965" y="108" class="small">结果反馈</text>
  <line x1="1070" y1="103" x2="1120" y2="103" class="capability"/>
  <text x="1135" y="108" class="small">能力接入</text>
  <line x1="1240" y1="103" x2="1290" y2="103" class="supply"/>
  <text x="1305" y="108" class="small">身份 / 配置供给</text>

  <!-- Identity and delivery -->
  <rect x="60" y="130" width="1380" height="145" rx="18" fill="#f3efff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="85" y="162" class="lane-title" fill="#5b21b6">长期身份与交付边界</text>

  <rect x="105" y="185" width="300" height="65" rx="12" fill="#ffffff" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="212" text-anchor="middle" class="node-title">Profile Distribution</text>
  <text x="255" y="234" text-anchor="middle" class="node-sub">可版本化的身份与能力来源</text>

  <path d="M405 217 H515" class="control"/>
  <text x="460" y="202" text-anchor="middle" class="small">install / update</text>

  <rect x="520" y="173" width="690" height="88" rx="14" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="865" y="202" text-anchor="middle" class="node-title">Profile Instance</text>
  <text x="865" y="227" text-anchor="middle" class="node-sub">身份 · Model / Tools · Skills · Memory / Sessions · 配置与本机状态</text>
  <text x="865" y="249" text-anchor="middle" class="small">定义谁在工作，以及这个长期实例拥有什么</text>

  <!-- Single Agent Runtime -->
  <rect x="60" y="305" width="1380" height="585" rx="18" fill="#eef6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="85" y="340" class="lane-title" fill="#1d4ed8">单 Agent 运行现场</text>
  <text x="310" y="340" class="small">责任中心仍是当前 Session</text>

  <rect x="80" y="375" width="175" height="76" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="167" y="406" text-anchor="middle" class="node-title">Trigger</text>
  <text x="167" y="430" text-anchor="middle" class="node-sub">User / Gateway / Cron</text>

  <rect x="330" y="375" width="145" height="76" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="402" y="407" text-anchor="middle" class="node-title">Session</text>
  <text x="402" y="430" text-anchor="middle" class="node-sub">当前任务现场</text>

  <rect x="550" y="375" width="145" height="76" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="622" y="407" text-anchor="middle" class="node-title">Context</text>
  <text x="622" y="430" text-anchor="middle" class="node-sub">规则 · 历史 · 状态</text>

  <rect x="770" y="375" width="145" height="76" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="842" y="407" text-anchor="middle" class="node-title">Model</text>
  <text x="842" y="430" text-anchor="middle" class="node-sub">判断下一步</text>

  <rect x="990" y="375" width="165" height="76" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="1072" y="407" text-anchor="middle" class="node-title">Tools / MCP</text>
  <text x="1072" y="430" text-anchor="middle" class="node-sub">动作接口</text>

  <rect x="1230" y="375" width="160" height="76" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="1310" y="407" text-anchor="middle" class="node-title">Runtime</text>
  <text x="1310" y="430" text-anchor="middle" class="node-sub">真实执行</text>

  <path d="M255 413 H330" class="control"/>
  <path d="M475 413 H550" class="control"/>
  <path d="M695 413 H770" class="control"/>
  <path d="M915 413 H990" class="control"/>
  <path d="M1155 413 H1230" class="control"/>

  <path d="M1310 451 V492 H370 V453" class="feedback"/>

  <!-- Capability injection -->
  <rect x="520" y="530" width="205" height="72" rx="12" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="622" y="559" text-anchor="middle" class="node-title">Memory / Skills</text>
  <text x="622" y="584" text-anchor="middle" class="node-sub">长期状态 / 程序性知识</text>
  <path d="M622 530 V453" class="capability"/>

  <rect x="765" y="530" width="155" height="72" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="842" y="559" text-anchor="middle" class="node-title">MoA</text>
  <text x="842" y="584" text-anchor="middle" class="node-sub">多模型，单行动者</text>
  <path d="M842 530 V453" class="capability"/>

  <rect x="990" y="530" width="165" height="72" rx="12" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="1072" y="559" text-anchor="middle" class="node-title">Plugins</text>
  <text x="1072" y="584" text-anchor="middle" class="node-sub">扩展代码能力</text>
  <path d="M1072 530 V453" class="capability"/>

  <rect x="1235" y="530" width="150" height="72" rx="12" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="1310" y="559" text-anchor="middle" class="node-title">Hooks</text>
  <text x="1310" y="584" text-anchor="middle" class="node-sub">治理事件边界</text>
  <path d="M1310 530 V453" class="capability"/>

  <rect x="680" y="462" width="340" height="27" rx="8" fill="#eef6ff"/>
  <text x="850" y="482" text-anchor="middle" class="label" fill="#047857">Observation 回到 Session，进入下一轮判断</text>

  <!-- Delegation -->
  <rect x="105" y="640" width="1290" height="205" rx="15" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="130" y="677" class="label">临时执行扩展</text>

  <rect x="307" y="710" width="190" height="72" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="402" y="741" text-anchor="middle" class="node-title">delegate_task</text>
  <text x="402" y="765" text-anchor="middle" class="node-sub">明确 goal + context</text>

  <rect x="620" y="710" width="260" height="72" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="750" y="741" text-anchor="middle" class="node-title">Temporary Child Agents</text>
  <text x="750" y="765" text-anchor="middle" class="node-sub">独立上下文，不是长期 Profile</text>

  <rect x="1080" y="710" width="205" height="72" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1182" y="741" text-anchor="middle" class="node-title">Summary</text>
  <text x="1182" y="765" text-anchor="middle" class="node-sub">责任返回父 Session</text>

  <path d="M402 451 V710" class="control"/>
  <path d="M497 746 H620" class="control"/>
  <path d="M880 746 H1080" class="control"/>
  <path d="M1182 710 V640 Q1182 620 1162 620 H470 Q450 620 450 600 V451" class="feedback"/>

  <!-- Profile supplies interactive identity -->
  <path d="M650 261 V348 Q650 360 638 360 H414 Q402 360 402 372 V375" class="supply"/>

  <!-- Persistent collaboration -->
  <rect x="60" y="925" width="1380" height="315" rx="18" fill="#f0fdf7" stroke="#86efac" stroke-width="2"/>
  <text x="85" y="960" class="lane-title" fill="#047857">持久任务协作</text>
  <text x="285" y="960" class="small">责任进入 Task System，任务可以跨进程继续存在</text>

  <rect x="100" y="1000" width="330" height="90" rx="14" fill="#ffffff" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="265" y="1031" text-anchor="middle" class="node-title">Kanban Board</text>
  <text x="265" y="1055" text-anchor="middle" class="node-sub">Task · Link · Run · Comment · Artifact</text>
  <text x="265" y="1077" text-anchor="middle" class="small">持久任务真值</text>

  <rect x="495" y="1008" width="205" height="74" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="597" y="1039" text-anchor="middle" class="node-title">Dispatcher</text>
  <text x="597" y="1063" text-anchor="middle" class="node-sub">依赖 · claim · 恢复</text>

  <rect x="765" y="1000" width="270" height="90" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="900" y="1031" text-anchor="middle" class="node-title">Profile Worker Process</text>
  <text x="900" y="1055" text-anchor="middle" class="node-sub">读取 Profile，执行一张 Task</text>
  <text x="900" y="1077" text-anchor="middle" class="small">一次真实运行</text>

  <rect x="1100" y="1008" width="290" height="74" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1245" y="1039" text-anchor="middle" class="node-title">Run / Comment / Artifact</text>
  <text x="1245" y="1063" text-anchor="middle" class="node-sub">下游可消费的交接物</text>

  <path d="M430 1045 H495" class="control"/>
  <path d="M700 1045 H765" class="control"/>
  <path d="M1035 1045 H1100" class="control"/>
  <path d="M1245 1082 V1168 H265 V1092" class="feedback"/>
  <text x="750" y="1158" text-anchor="middle" class="label" fill="#047857">结果、状态和证据回写 Board，成为下一轮调度与下游任务的输入</text>

  <!-- Profile supplies worker identity -->
  <path d="M1210 217 H1420 V980 H1037" class="supply"/>
  <rect x="1150" y="940" width="250" height="28" rx="8" fill="#f0fdf7"/>
  <text x="1275" y="960" text-anchor="middle" class="small" fill="#6d28d9">作为 assignee 身份模板</text>

  <!-- Closing distinction -->
  <rect x="60" y="1275" width="1380" height="235" rx="18" fill="#ffffff" stroke="#d7dce5" stroke-width="2"/>
  <text x="85" y="1313" class="lane-title">三种并行机制扩展的不是同一个对象</text>

  <rect x="100" y="1340" width="390" height="105" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="295" y="1375" text-anchor="middle" class="anchor-title">MoA 扩展判断视角</text>
  <text x="295" y="1404" text-anchor="middle" class="anchor-sub">多个 Reference Models</text>
  <text x="295" y="1427" text-anchor="middle" class="anchor-sub">一个 Aggregator 行动</text>

  <rect x="555" y="1340" width="390" height="105" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="750" y="1375" text-anchor="middle" class="anchor-title">delegate_task 扩展临时执行</text>
  <text x="750" y="1404" text-anchor="middle" class="anchor-sub">子 Agent 返回摘要</text>
  <text x="750" y="1427" text-anchor="middle" class="anchor-sub">最终责任仍在父 Session</text>

  <rect x="1010" y="1340" width="390" height="105" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1205" y="1375" text-anchor="middle" class="anchor-title">Kanban 扩展持久组织</text>
  <text x="1205" y="1404" text-anchor="middle" class="anchor-sub">任务跨进程存在</text>
  <text x="1205" y="1427" text-anchor="middle" class="anchor-sub">责任进入持久 Task System</text>

  <text x="750" y="1485" text-anchor="middle" class="small">Profile 定义谁在工作 · Session 承载当前现场 · Kanban 保存跨运行任务真值</text>
</svg>
